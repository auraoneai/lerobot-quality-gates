name: Gate LeRobot Dataset Quality
description: Check local LeRobot-style dataset metadata, episodes, media references, labels, and card disclosures.
author: AuraOne
branding:
  icon: check-circle
  color: green
inputs:
  path:
    description: Repository-relative path to the local LeRobot-style dataset directory.
    required: false
    default: "."
  fail-on:
    description: "Lowest severity that fails the job: low, medium, high, critical, or none."
    required: false
    default: "high"
  format:
    description: "Report serialization written to the job log: markdown, json, hf-card, or badge."
    required: false
    default: "markdown"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        python -m pip install "${{ github.action_path }}"
        lerobot-quality-gates check "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}" --format "${{ inputs.format }}"
